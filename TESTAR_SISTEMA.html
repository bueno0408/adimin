<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Teste Felipe OS</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase-config.js"></script><style>body{font-family:Arial,sans-serif;background:#07111f;color:#f4f7fb;padding:28px}.card{max-width:900px;background:#111b2e;border:1px solid #2a3b5f;border-radius:24px;padding:24px}button{border:0;border-radius:14px;padding:12px 16px;background:#38bdf8;font-weight:800;cursor:pointer;margin:6px}pre{white-space:pre-wrap;background:#050b14;border:1px solid #2a3b5f;border-radius:16px;padding:16px}</style></head><body><div class="card"><h1>Teste Felipe OS</h1><p>Confirma se o site está lendo o Supabase.</p><button onclick="testar()">Testar tudo</button><pre id="out">Aguardando...</pre></div><script>const sb=supabase.createClient(window.SUPABASE_URL,window.SUPABASE_ANON_KEY),out=document.getElementById('out');function log(t){out.textContent+=t+'\n'}async function table(n){log('Testando '+n+'...');let r=await sb.from(n).select('*').limit(1);if(r.error)throw new Error(n+': '+r.error.message);log('OK '+n)}async function testar(){out.textContent='';try{for(const t of ['fo_users','fo_tasks','fo_notes','fo_inventory','fo_dwg_folders','fo_dwg_files'])await table(t);let ins=await sb.from('fo_tasks').insert({title:'Teste do GitHub Pages',description:'Teste de gravação',status:'A Fazer',priority:'Baixa',due_date:new Date().toISOString().slice(0,10),area:'Teste'}).select('id').single();if(ins.error)throw new Error('insert: '+ins.error.message);await sb.from('fo_tasks').delete().eq('id',ins.data.id);log('\nDEU CERTO: site conectado ao Supabase.')}catch(e){log('\nERRO: '+e.message);log('Se faltar tabela, rode o SQL do sistema no Supabase.')}}</script></body></html>
